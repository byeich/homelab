- name: Install Longhorn prerequisites
  ansible.builtin.apt:
    update_cache: true
    name:
      - open-iscsi
      - nfs-common
      - util-linux
    state: present

- name: Enable and start iscsid
  ansible.builtin.service:
    name: iscsid
    state: started
    enabled: true

- name: Check if /dev/sda is already formatted
  ansible.builtin.command: blkid /dev/sda
  register: sdb_blkid
  changed_when: false
  failed_when: false

- name: Format /dev/sda as ext4
  ansible.builtin.command: mkfs.ext4 /dev/sda
  when: sdb_blkid.rc != 0
  changed_when: true

- name: Get UUID of /dev/sda
  ansible.builtin.command: blkid -s UUID -o value /dev/sda
  register: disk_uuid
  changed_when: false

- name: Create Longhorn data directory
  ansible.builtin.file:
    path: /var/lib/longhorn
    state: directory
    mode: "0750"

- name: Add disk to fstab by UUID
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "longhorn"
    line: "UUID={{ disk_uuid.stdout }} /var/lib/longhorn ext4 defaults 0 2"
    state: present

- name: Check if /var/lib/longhorn is already mounted
  ansible.builtin.command: mountpoint -q /var/lib/longhorn
  register: mount_check
  changed_when: false
  failed_when: false

- name: Mount /var/lib/longhorn
  ansible.builtin.command: mount /var/lib/longhorn
  when: mount_check.rc != 0
  changed_when: true
