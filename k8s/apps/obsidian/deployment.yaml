apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian
  namespace: obsidian
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: obsidian
  template:
    metadata:
      labels:
        app: obsidian
        app.kubernetes.io/name: obsidian
    spec:
      securityContext:
        fsGroup: 5984
      containers:
        - name: couchdb
          image: couchdb:3
          ports:
            - containerPort: 5984
          env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: obsidian-secret
                  key: admin-user
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: obsidian-secret
                  key: admin-password
            - name: COUCHDB_SINGLE_NODE
              value: "true"
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    until curl -sf http://localhost:5984/_up; do sleep 1; done
                    curl -s -X PUT "http://$COUCHDB_USER:$COUCHDB_PASSWORD@localhost:5984/_node/_local/_config/httpd/enable_cors" -d '"true"'
                    curl -s -X PUT "http://$COUCHDB_USER:$COUCHDB_PASSWORD@localhost:5984/_node/_local/_config/chttpd/require_valid_user" -d '"true"'
                    curl -s -X PUT "http://$COUCHDB_USER:$COUCHDB_PASSWORD@localhost:5984/_node/_local/_config/cors/origins" -d '"app://obsidian.md,capacitor://localhost,http://localhost"'
                    curl -s -X PUT "http://$COUCHDB_USER:$COUCHDB_PASSWORD@localhost:5984/_node/_local/_config/cors/credentials" -d '"true"'
                    curl -s -X PUT "http://$COUCHDB_USER:$COUCHDB_PASSWORD@localhost:5984/_node/_local/_config/cors/headers" -d '"accept, authorization, content-type, origin, referer"'
                    curl -s -X PUT "http://$COUCHDB_USER:$COUCHDB_PASSWORD@localhost:5984/_node/_local/_config/cors/methods" -d '"GET, PUT, DELETE, POST, HEAD"'
          volumeMounts:
            - name: data
              mountPath: /opt/couchdb/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: obsidian-data
