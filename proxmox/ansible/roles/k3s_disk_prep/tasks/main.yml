- name: Install Longhorn prerequisites
  ansible.builtin.apt:
    update_cache: true
    name:
      - open-iscsi
      - nfs-common
      - util-linux
      - cryptsetup
    state: present

- name: Enable and start iscsid
  ansible.builtin.service:
    name: iscsid
    state: started
    enabled: true

- name: Load dm_crypt kernel module
  community.general.modprobe:
    name: dm_crypt
    state: present

- name: Persist dm_crypt across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/longhorn.conf
    content: "dm_crypt\n"
    mode: "0644"

- name: Check if /dev/sda is already formatted
  ansible.builtin.command: blkid /dev/sda
  register: k3s_disk_prep_sdb_blkid
  changed_when: false
  failed_when: false

- name: Format /dev/sda as ext4
  ansible.builtin.command: mkfs.ext4 /dev/sda
  when: k3s_disk_prep_sdb_blkid.rc != 0
  changed_when: true

- name: Get UUID of /dev/sda
  ansible.builtin.command: blkid -s UUID -o value /dev/sda
  register: k3s_disk_prep_disk_uuid
  changed_when: false

- name: Create Longhorn data directory
  ansible.builtin.file:
    path: /var/lib/longhorn
    state: directory
    mode: "0750"

- name: Mount /var/lib/longhorn (and persist in fstab)
  ansible.posix.mount:
    path: /var/lib/longhorn
    src: "UUID={{ k3s_disk_prep_disk_uuid.stdout }}"
    fstype: ext4
    opts: defaults
    dump: "0"
    passno: "2"
    state: mounted
