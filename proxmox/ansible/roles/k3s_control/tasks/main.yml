- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_control_bin

# config must exist before first install so the initial cert includes the VIP SANs
- name: Ensure k3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write k3s server config (TLS SANs for VIP)
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0600"
    content: |
      tls-san:
        - "{{ k3s_vip }}"
        - "k8s-api.bkylab.net"
  notify: Restart k3s

# curl|sh is a supply-chain risk in production (no signature verification before execution).
# Acceptable here because INSTALL_K3S_VERSION pins the exact release, and the k3s installer
# is maintained by Rancher/SUSE with a strong release process. For production, download the
# installer, verify its SHA256 against https://github.com/k3s-io/k3s/releases, then execute.
- name: Install k3s server (init node)  # noqa: command-instead-of-module
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL https://get.k3s.io | K3S_TOKEN={{ k3s_token }} sh -s - server --cluster-init
  args:
    executable: /bin/bash
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
  when:
    - not k3s_control_bin.stat.exists
    - inventory_hostname == groups['k3s-control'][0]
  changed_when: true
  notify: Restart k3s

- name: Wait for k3s token file to exist (init node)
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 120
  when: inventory_hostname == groups['k3s-control'][0]

- name: Install k3s server (join additional control nodes)  # noqa: command-instead-of-module
  # Uses ctrl1's IP, not the VIP — kube-vip isn't deployed until after ctrl1 is up and
  # ArgoCD has synced, so the VIP isn't available when ctrl2/ctrl3 join for the first time.
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL https://get.k3s.io | K3S_TOKEN={{ k3s_token }} sh -s - server \
      --server https://{{ hostvars[groups['k3s-control'][0]]['ansible_host'] }}:{{ k3s_api_port }}
  args:
    executable: /bin/bash
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
  when:
    - not k3s_control_bin.stat.exists
    - inventory_hostname != groups['k3s-control'][0]
  changed_when: true
  notify: Restart k3s

- name: Ensure k3s service is running and enabled
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true
