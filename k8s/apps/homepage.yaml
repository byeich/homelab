apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.telegram: "-5421448913"
    notifications.argoproj.io/subscribe.on-sync-failed.telegram: "-5421448913"
    notifications.argoproj.io/subscribe.on-health-degraded.telegram: "-5421448913"
spec:
  project: default
  source:
    repoURL: https://github.com/byeich/homelab
    targetRevision: argocd-notifs
    path: k8s/apps/homepage
  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
