- name: Set timezone
  ansible.builtin.copy:
    dest: /etc/timezone
    content: "{{ pihole_timezone }}\n"
    owner: root
    group: root
    mode: "0644"

- name: Ensure base packages are installed
  ansible.builtin.apt:
    update_cache: true
    name:
      - ca-certificates
      - curl
      - dnsutils
      - iproute2
      - sudo
    state: present

- name: Ensure Pi-hole directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/pihole
    - /etc/dnsmasq.d

- name: Write Pi-hole setupVars.conf
  ansible.builtin.template:
    src: setupVars.conf.j2
    dest: /etc/pihole/setupVars.conf
    owner: root
    group: root
    mode: "0644"

- name: Check if Pi-hole is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/pihole
  register: pihole_bin

- name: Stop/disable systemd-resolved if present (avoid port 53 conflict)
  ansible.builtin.service:
    name: systemd-resolved
    state: stopped
    enabled: false
  ignore_errors: true

- name: Run Pi-hole unattended installer (first install)
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://install.pi-hole.net | bash /dev/stdin --unattended
  args:
    executable: /bin/bash
  environment:
    PIHOLE_SKIP_OS_CHECK: "true"
    DEBIAN_FRONTEND: "noninteractive"
  when: not pihole_bin.stat.exists

- name: Set Pi-hole web password
  ansible.builtin.command: "pihole -a -p {{ pihole_web_password }}"
  changed_when: true

- name: Ensure Pi-hole FTL is enabled and running
  ansible.builtin.service:
    name: pihole-FTL
    state: started
    enabled: true

- name: Ensure lighttpd is installed (Pi-hole web UI)
  ansible.builtin.apt:
    name: lighttpd
    state: present
  when: pihole_install_web | default(true) | bool

- name: Check if lighttpd systemd unit exists
  ansible.builtin.stat:
    path: /lib/systemd/system/lighttpd.service
  register: lighttpd_unit

- name: Ensure lighttpd is enabled and running (web UI)
  ansible.builtin.service:
    name: lighttpd
    state: started
    enabled: true
  when:
    - pihole_install_web | default(true) | bool
    - lighttpd_unit.stat.exists

- name: Print useful URLs
  ansible.builtin.debug:
    msg:
      - "Pi-hole web UI: http://{{ ansible_host | default(inventory_hostname) }}/admin"
      - "DNS is on port 53 (set your router/DHCP to hand out this IP as DNS)."
