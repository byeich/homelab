apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-ingress
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/byeich/homelab
    targetRevision: k3s-time
    path: k8s/infrastructure/ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
