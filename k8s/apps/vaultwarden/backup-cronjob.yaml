apiVersion: batch/v1
kind: CronJob
metadata:
  name: vaultwarden-sqlite-backup
  namespace: vaultwarden
spec:
  schedule: "30 1 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: curlimages/curl:8.19.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  RESP=$(curl -sf -i -X POST "http://vaultwarden.vaultwarden.svc.cluster.local/admin/" \
                    -H "Content-Type: application/x-www-form-urlencoded" \
                    --data-urlencode "token=${ADMIN_TOKEN}")
                  COOKIE=$(printf '%s' "$RESP" | grep -i "set-cookie" | grep -o "VW_ADMIN=[^;]*")
                  if [ -z "$COOKIE" ]; then
                    echo "ERROR: admin login failed, no cookie received" >&2
                    exit 1
                  fi
                  curl -sf -X POST "http://vaultwarden.vaultwarden.svc.cluster.local/admin/config/backup_db" \
                    -H "Cookie: ${COOKIE}" \
                    -H "Content-Type: application/json"
                  echo "SQLite backup triggered at $(date -u)"
              env:
                - name: ADMIN_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: vaultwarden-secret
                      key: admin-token
