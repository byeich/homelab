apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.telegram: "-5248737533"
    notifications.argoproj.io/subscribe.on-sync-failed.telegram: "-5248737533"
    notifications.argoproj.io/subscribe.on-health-degraded.telegram: "-5248737533"
spec:
  project: default
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: 1.7.x
      helm:
        valueFiles:
          - $values/k8s/infrastructure/longhorn/values.yaml
    - repoURL: https://github.com/byeich/homelab
      targetRevision: add-github-actions
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  # NOTE: On a fresh cluster, Longhorn must be installed via helm FIRST (scripts/bootstrap.sh
  # does this). The pre-upgrade hook requires a ServiceAccount that doesn't exist until the
  # chart installs it — ArgoCD sync fails on initial apply. After the helm install, ArgoCD
  # adopts the release and auto-sync works fine from that point on.
  #
  # To suspend auto-sync (if needed): kubectl patch application longhorn -n argocd \
  #   --type merge -p '{"spec":{"syncPolicy":{"automated":null}}}'
  # To re-enable: kubectl patch application longhorn -n argocd \
  #   --type merge -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
