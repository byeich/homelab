apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-backup
  namespace: longhorn-system
spec:
  cron: "0 2 * * *"   # 2am daily
  task: backup
  groups:
    - default
  retain: 7
  concurrency: 1
  labels: {}
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-snapshot
  namespace: longhorn-system
spec:
  cron: "0 1 * * 0"   # 1am every Sunday
  task: snapshot
  groups:
    - default
  retain: 4
  concurrency: 1
  labels: {}
