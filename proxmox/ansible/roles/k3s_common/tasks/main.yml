- name: Write resolv.conf
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 10.0.0.53
      nameserver 1.1.1.1
    mode: "0644"

- name: apt | update cache and install base packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    name:
      - curl
      - ca-certificates
      - open-iscsi
      - nfs-common
    state: present

- name: Enable and start iscsid
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Remove swap entries from fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+\S+\s+.*)$'
    replace: '# \1'

- name: Ensure k3s kernel modules load on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

- name: Load overlay module
  ansible.builtin.command: modprobe overlay
  changed_when: false

- name: Load br_netfilter module
  ansible.builtin.command: modprobe br_netfilter
  changed_when: false

- name: Set sysctl params for k3s networking
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-k3s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    mode: "0644"
  notify: reload sysctl
