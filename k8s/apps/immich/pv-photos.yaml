apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-photos-nfs
spec:
  capacity:
    storage: 9Ti
  accessModes:
    - ReadWriteMany
  nfs:
    server: 10.0.0.9
    path: /mnt/bigtank/immich_data
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: immich-photos
    namespace: immich
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-photos
  namespace: immich
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: immich-photos-nfs
  resources:
    requests:
      storage: 9Ti
