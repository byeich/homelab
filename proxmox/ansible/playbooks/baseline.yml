- name: Base config for Debian LXC
  hosts: lxc_host
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - vim
          - htop
          - git
          - sudo
        state: present
    - name: Start SSH service
      ansible.builtin.service:
        name: ssh
        state: started
        enabled: true
