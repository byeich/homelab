apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: bkylab
    theme: dark
    color: slate
    headerStyle: clean
    background:
      image: https://images.unsplash.com/photo-1501691223387-dd0500403074?w=1920&q=80
      blur: sm
      saturate: 70
      brightness: 40
      opacity: 80
    cardBlur: md
    layout:
      Media:
        icon: mdi-play-circle
      Files & Storage:
        icon: mdi-folder-multiple
      Security:
        icon: mdi-shield-lock
      Infrastructure:
        icon: mdi-server
      Links:
        icon: mdi-link-variant

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: homelab
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hourCycle: h23

  services.yaml: |
    - Media:
        - Immich:
            href: https://immich.bkylab.net
            description: Photo library
            icon: immich.png
            namespace: immich
            app: immich-server
        - Jellyfin:
            href: http://10.0.0.9:30013
            description: Media server
            icon: jellyfin.png

    - Files & Storage:
        - Nextcloud:
            href: http://10.0.0.11
            description: File sync
            icon: nextcloud.png
        - TrueNAS:
            href: http://10.0.0.9
            description: NAS storage
            icon: truenas.png

    - Security:
        - Vaultwarden:
            href: https://vaultwarden.bkylab.net
            description: Password manager
            icon: vaultwarden.png
            namespace: vaultwarden
            app: vaultwarden
        - Pi-hole:
            href: https://10.0.0.53/admin/
            description: DNS & ad blocking
            icon: pi-hole.png

    - Infrastructure:
        - Proxmox:
            href: https://10.0.0.10:8006
            description: Hypervisor
            icon: proxmox.png
        - Router:
            href: http://10.0.0.1
            description: Router
            icon: router.png
        - ArgoCD:
            href: http://argocd.bkylab.net
            description: GitOps
            icon: argo-cd.png
        - Longhorn:
            href: http://longhorn.bkylab.net
            description: Distributed storage
            icon: longhorn.png

  bookmarks.yaml: |
    - Links:
        - GitHub:
            - href: https://github.com/byeich/homelab
              icon: github.png
              description: Homelab repo
        - Cloudflare:
            - href: https://dash.cloudflare.com
              icon: cloudflare.png
              description: DNS & tunnels
        - Cloudflare Zero Trust:
            - href: https://one.dash.cloudflare.com
              icon: cloudflare-zero-trust.png
              description: Access & security

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: |
    {}
