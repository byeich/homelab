apiVersion: batch/v1
kind: CronJob
metadata:
  name: vaultwarden-sqlite-backup
  namespace: vaultwarden
spec:
  schedule: "30 1 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: curlimages/curl:8.7.1
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  curl -sf -c /tmp/cookies.txt \
                    -X POST "http://vaultwarden.vaultwarden.svc.cluster.local/admin/" \
                    -H "Content-Type: application/x-www-form-urlencoded" \
                    -d "token=${ADMIN_TOKEN}"
                  curl -sf -b /tmp/cookies.txt \
                    -X POST "http://vaultwarden.vaultwarden.svc.cluster.local/admin/backup"
                  echo "SQLite backup triggered at $(date -u)"
              env:
                - name: ADMIN_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: vaultwarden-secret
                      key: admin-token
